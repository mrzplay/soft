name: Auto Run Script

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: |
          sudo apt-get update
          sudo apt-get install p7zip-full -y
          pip install requests

      - env:
          ZIP_PASS: ${{ secrets.ZIP_PASSWORD }}
        run: 7z x archive.zip -p"$ZIP_PASS" -y

      - run: python main.py

      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add TATA_SOFT.json
          git commit -m "Auto update TATA_SOFT.json" || echo "No changes to commit"
          git push
